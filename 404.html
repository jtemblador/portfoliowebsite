<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050510">
  <meta name="robots" content="noindex">
  <title>404 — Lost in Space | Jose T. Temblador</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { color-scheme: dark; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #050510;
      color: #8892b0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 5rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.04em;
      line-height: 1.1;
    }
    p { margin: 1rem 0 2rem; font-size: 1rem; }
    a {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      border: 1px solid #4ade80;
      border-radius: 9999px;
      color: #4ade80;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    a:hover {
      color: #86efac;
      border-color: #86efac;
      box-shadow: 0 0 16px rgba(74, 222, 128, 0.5);
    }
    a:focus-visible { outline: 2px solid #4ade80; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>This page drifted out of orbit.</p>
    <a href="/">Back to the portfolio</a>
  </main>
</body>
</html>
